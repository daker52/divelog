name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 194.182.80.24
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            curl -fsSL https://raw.githubusercontent.com/daker52/divelog/main/deploy.sh | bash
